        const ClipboardList = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;
        // -----------------------------------------------------------------------------

        // Anti-Crash Safety Net (Prevents White Screens)
        class ErrorBoundary extends Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, errorInfo: null };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, errorInfo: error };
          }
          render() {
            if (this.state.hasError) {
              return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-6">
                  <div className="bg-red-50 p-6 rounded-2xl border border-red-200 max-w-2xl w-full">
                    <AlertCircle className="w-10 h-10 text-red-500 mb-4" />
                    <h2 className="text-xl font-bold text-red-900 mb-2">Oops! Something went wrong.</h2>
                    <p className="text-red-700 mb-4">A rendering error occurred. The app caught it to prevent a white screen.</p>
                    <div className="bg-white p-4 rounded-lg overflow-auto text-xs font-mono text-red-800 border border-red-100">
                      {this.state.errorInfo?.toString()}
                    </div>
                    <button 
                      onClick={() => window.location.reload()} 
                      className="mt-6 bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 font-medium"
                    >
                      Reload Dashboard
                    </button>
                  </div>
                </div>
              );
            }
            return this.props.children;
          }
        }

        // Anti-Hang Fetch Utility
        const fetchWithTimeout = async (resource, options = {}) => {
          const { timeout = 12000 } = options;
          const controller = new AbortController();
          const id = setTimeout(() => controller.abort(), timeout);
          try {
            const response = await fetch(resource, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
          } catch (error) {
            clearTimeout(id);
            throw error;
          }
        };

        // Safe JSON Extractor
        const extractJson = (text, sourceName) => {
          const start = text.indexOf('{');
          const end = text.lastIndexOf('}');
          if (start === -1 || end === -1) {
            throw new Error(`Sheet Data Format Error in ${sourceName}. Yeh error tab aata hai jab Google Sheet Private ho. Kripya dhyan dein ki sheet 'Anyone with the link can view' par set ho.`);
          }
          return JSON.parse(text.substring(start, end + 1));
        };

        function DashboardApp() {
          const [data, setData] = useState([]);
          const [baseBalances, setBaseBalances] = useState({}); 
          const [managerData, setManagerData] = useState({}); 
          
          // BUDGET STATE
          const [budgetData, setBudgetData] = useState({ records: [], availablePeriods: [] }); 
          const [budgetYearFilter, setBudgetYearFilter] = useState('');
          const [budgetMonthFilter, setBudgetMonthFilter] = useState('');
          const [budgetLocFilter, setBudgetLocFilter] = useState('All');
          const [budgetHeadFilter, setBudgetHeadFilter] = useState('All');
          
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          
          // Helper function to get today's date
          const getTodayString = () => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
          };

          // App states
          const [activeTab, setActiveTab] = useState('sales'); 
          const [startDate, setStartDate] = useState(getTodayString());
          const [endDate, setEndDate] = useState(getTodayString());
          const [selectedLocation, setSelectedLocation] = useState('All');
          const [locations, setLocations] = useState([]);
          
          // Drill-down Modal State
          const [selectedExpenseForDetail, setSelectedExpenseForDetail] = useState(null);
          const [modalLocationFilter, setModalLocationFilter] = useState('All');

          const SHEET_ID = '1h2cUl1WB6E9ErvXuaFGkBgiaDZ6CqwC7NArnYHrhmGA';
          const DATA_SHEET = 'Data';
          const CASH_FLOW_SHEET = 'Cash Flow';
          
          const BUDGET_SHEET_ID = '1FtOANfxm8NUasFyfnnBPCPJKZeOrXhlEjxKJT3AeYPE';
          const BUDGET_SHEET_NAME = 'Budget Sheet By Ambuj for New Query';
          const BUDGET_INDEX_SHEET_NAME = 'Budget Index By Ambuj';

          const MANAGER_SHEETS = {
              "Aligarh": "10rVHVBiKKmG3vV-WwhMuOaeXyN2phIhHnwacHqJwAlI",
              "RDC": "1qefoF_cqwTjZcxW-2f8UMfva29_aNukwj5LBO_cm0oA",
              "Vaishali": "1aTUkChNOgo6OFrSK--7Q7PokSyXu345Ly4g4OPh1dMs",
              "Sector-137": "1SFNF-Ba-xWocWPRvWU9zBZCePqyFgzuZ0h-PYdkWrPE",
              "Meerut": "1D7H3a0Z7pXSfqB9KKB_-utbwoJEO0BGvrNO5ltskazE",
              "Agra": "1Xapg3ibKsSjw5MTkbvT1TErj60Z4rSvVxy067zrqwhw",
              "Vivek Vihar": "1RAOW0nq0I3_LcWMLXTQIw4Et0uMAuwVof9GsBr-PcQ0",
              "Parkway": "1sglMnID6V7AlRtDgo74N9r3mBTrag2GZMnPqWKMZlPk",
              "Mathura": "1CkI1VMhoWynkFwcCzPQwFTUY_2zbHj3hUgG5CviuN28"
          };

          const BASE_DATE = new Date(2025, 10, 1).getTime(); 

          const fetchData = async () => {
            setLoading(true);
            setError(null);

            try {
              const cacheBuster = new Date().getTime();
              const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${DATA_SHEET}&t=${cacheBuster}`;
              const CASH_FLOW_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${CASH_FLOW_SHEET}&t=${cacheBuster}`;
              
              const BUDGET_URL = `https://docs.google.com/spreadsheets/d/${BUDGET_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(BUDGET_SHEET_NAME)}&t=${cacheBuster}`;
              const BUDGET_INDEX_URL = `https://docs.google.com/spreadsheets/d/${BUDGET_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(BUDGET_INDEX_SHEET_NAME)}&t=${cacheBuster}`;
              
              const [dataResponse, cashFlowResponse, budgetResponse, budgetIndexResponse] = await Promise.all([
                  fetchWithTimeout(DATA_URL, { timeout: 15000 }),
                  fetchWithTimeout(CASH_FLOW_URL, { timeout: 15000 }),
                  fetchWithTimeout(BUDGET_URL, { timeout: 15000 }).catch((e) => { console.log(`Budget Sheet Error: ${e.message}`); return null; }),
                  fetchWithTimeout(BUDGET_INDEX_URL, { timeout: 15000 }).catch((e) => { console.log(`Budget Index Error: ${e.message}`); return null; })
              ]);

              const dataText = await dataResponse.text();
              const cfText = await cashFlowResponse.text();
              
              const dataJson = extractJson(dataText, 'Main Data Sheet');
              const cfJson = extractJson(cfText, 'Cash Flow Sheet');

              if (!dataJson?.table?.rows) {
                throw new Error("Main 'Data' sheet is empty or improperly formatted.");
              }

              // ==========================================
              // 1. Ultra-Safe Parse for 'Cash Flow' Sheet
              // ==========================================
              const parsedBalances = {};
              if (cfJson?.table?.rows && cfJson.table.rows.length > 0) {
                  let cfHeaders = cfJson.table.cols?.map(c => c?.label?.trim().toLowerCase() || '') || [];
                  let cfStart = 0;
                  if (cfHeaders.every(h => h === '')) {
                      if (cfJson.table.rows[0]?.c) {
                          cfHeaders = cfJson.table.rows[0].c.map(c => String(c?.v || c?.f || '').trim().toLowerCase());
                          cfStart = 1;
                      }
                  }
                  const getCfIdx = (keywords) => {
                      let idx = cfHeaders.findIndex(h => keywords.includes(h));
                      if (idx !== -1) return idx;
                      return cfHeaders.findIndex(h => keywords.some(kw => h.includes(kw)));
                  };

                  let idxCfLoc = getCfIdx(['username', 'location']);
                  if (idxCfLoc === -1) idxCfLoc = 0; 
                  let idxCfBal = getCfIdx(['op. bal', 'balance', 'amount', 'nov']);
                  if (idxCfBal === -1) idxCfBal = 1; 

                  for (let i = cfStart; i < cfJson.table.rows.length; i++) {
                      const row = cfJson.table.rows[i];
                      if (!row || !row.c) continue;
                      const cellLoc = row.c[idxCfLoc];
                      const cellBal = row.c[idxCfBal];

                      let locName = cellLoc ? String(cellLoc.v || cellLoc.f || '').trim() : '';
                      let balAmount = 0;
                      if (cellBal) {
                          let val = cellBal.v !== null && cellBal.v !== undefined ? cellBal.v : cellBal.f;
                          if (typeof val === 'number') {
                              balAmount = val;
                          } else if (val) {
                              const cleanStr = String(val).replace(/,/g, '').replace(/[^\d.-]/g, '');
                              balAmount = parseFloat(cleanStr) || 0;
                          }
                      }
                      if (locName) parsedBalances[locName] = balAmount;
                  }
              }
              setBaseBalances(parsedBalances);


              // ==========================================
              // 2. Fetch & Parse ALL Manager Sheets Concurrently
              // ==========================================
              const parsedManagerData = {};
              const managerPromises = Object.entries(MANAGER_SHEETS).map(async ([locName, sheetId]) => {
                  try {
                      const mgrUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Form&t=${cacheBuster}`;
                      const mgrRes = await fetchWithTimeout(mgrUrl, { timeout: 10000 });
                      if (!mgrRes.ok) return; 
                      
                      const mgrText = await mgrRes.text();
                      const mgrJson = extractJson(mgrText, `Manager Sheet: ${locName}`);
                      
                      if (mgrJson?.table?.rows) {
                          for (let i = 0; i < mgrJson.table.rows.length; i++) {
                              const row = mgrJson.table.rows[i];
                              if (!row || !row.c) continue;
                              
                              let dateKey = '';
                              const dateCell = row.c[0]; 
                              if (dateCell) {
                                  if (typeof dateCell.v === 'string' && dateCell.v.startsWith('Date(')) {
                                      const m = dateCell.v.match(/Date\((\d+),\s*(\d+),\s*(\d+)/);
                                      if (m) {
                                          const d = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
                                          dateKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                                      }
                                  } else if (dateCell.f) {
                                      const d = new Date(dateCell.f);
                                      if(!isNaN(d)) dateKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                                      else dateKey = dateCell.f.trim();
                                  } else if (dateCell.v) {
                                      const d = new Date(dateCell.v);
                                      if(!isNaN(d)) dateKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                                      else dateKey = String(dateCell.v).trim();
                                  }
                              }
                              
                              if (!dateKey || dateKey.toLowerCase().includes('date')) continue; 

                              const getMgrVal = (idx) => {
                                  const cell = row.c[idx];
                                  if(!cell) return 0;
                                  let val = cell.v !== null && cell.v !== undefined ? cell.v : cell.f;
                                  if (typeof val === 'number') return val;
                                  if (val) {
                                      const clean = String(val).replace(/,/g, '').replace(/[^\d.-]/g, '');
                                      return parseFloat(clean) || 0;
                                  }
                                  return 0;
                              };

                              parsedManagerData[`${dateKey}_${locName}`] = {
                                  managerName: row.c[1] ? String(row.c[1].v || row.c[1].f || '') : 'Unknown',
                                  cash: getMgrVal(2), 
                                  upi: getMgrVal(10), 
                                  card: getMgrVal(11) 
                              };
                          }
                      }
                  } catch(e) {
                      console.log(`Silent skip: Failed fetching manager sheet for ${locName}`);
                  }
              });
              
              await Promise.all(managerPromises);
              setManagerData(parsedManagerData);


              // ==========================================
              // 3A. DYNAMIC BUDGET PARSER - Step 1: Read Budget Index
              // ==========================================
              const monthColMap = {}; 
              const availablePeriodsSet = new Set();
              const periodsList = [];
              let maxReqCol = 3; 

              // Function to convert "C" to 2, "AA" to 26, etc.
              const colToIndex = (colStr) => {
                  let idx = 0;
                  for (let i = 0; i < colStr.length; i++) {
                      idx = idx * 26 + (colStr.charCodeAt(i) - 64);
                  }
                  return idx - 1; 
              };

              if (budgetIndexResponse && budgetIndexResponse.ok) {
                  try {
                      const idxText = await budgetIndexResponse.text();
                      const idxJson = extractJson(idxText, 'Budget Index Sheet');
                      
                      if (idxJson.table && idxJson.table.rows) {
                          idxJson.table.rows.forEach(r => {
                              if(!r || !r.c) return;
                              // Col A=Sheet Name, Col B=Year, Col C=Month, Col D=Column Index
                              const year = r.c[1] ? String(r.c[1].v !== null && r.c[1].v !== undefined ? r.c[1].v : (r.c[1].f || '')).trim() : '';
                              const month = r.c[2] ? String(r.c[2].v !== null && r.c[2].v !== undefined ? r.c[2].v : (r.c[2].f || '')).trim() : '';
                              const colLetter = r.c[3] ? String(r.c[3].v !== null && r.c[3].v !== undefined ? r.c[3].v : (r.c[3].f || '')).trim().toUpperCase() : '';

                              if(year && month && colLetter && !year.toLowerCase().includes('year')) {
                                  const colIdx = colToIndex(colLetter);
                                  if (colIdx >= 0) {
                                      const pKey = `${year}-${month}`;
                                      monthColMap[pKey] = colIdx;
                                      if (colIdx > maxReqCol) maxReqCol = colIdx;
                                      
                                      if (!availablePeriodsSet.has(pKey)) {
                                          availablePeriodsSet.add(pKey);
                                          periodsList.push({ year, month });
                                      }
                                  }
                              }
                          });
                      }
                  } catch(e) {
                      console.log("Error parsing budget index:", e);
                  }
              }

              // ==========================================
              // 3B. DYNAMIC BUDGET PARSER - Step 2: Read Plans dynamically from Index Map
              // ==========================================
              const parsedBudget = [];
              if (budgetResponse && budgetResponse.ok) {
                  try {
                      const bText = await budgetResponse.text();
                      const bJson = extractJson(bText, 'Budget Sheet');
                      
                      const grid = [];
                      if (bJson.table.cols) {
                          grid.push(bJson.table.cols.map(c => c && c.label !== undefined && c.label !== '' ? String(c.label) : (c && c.v !== undefined && c.v !== null ? String(c.v) : '')));
                      }
                      if (bJson.table.rows) {
                          bJson.table.rows.forEach(r => {
                              if(!r || !r.c) return;
                              const rowData = [];
                              const maxCols = Math.max(r.c.length, maxReqCol + 1);
                              for(let j=0; j<maxCols; j++) {
                                 let cell = r.c[j];
                                 rowData.push(cell ? (cell.v !== null && cell.v !== undefined ? cell.v : (cell.f || '')) : '');
                              }
                              grid.push(rowData);
                          });
                      }

                      grid.forEach(row => {
                          let loc = String(row[0] || '').trim();
                          let head = String(row[1] || '').trim();

                          // Skip header rows dynamically
                          if (!loc || !head || loc.toLowerCase() === 'salon location' || loc.toLowerCase() === 'saloon location' || head.toLowerCase() === 'expense heads') {
                              return;
                          }

                          let planByMonth = {};
                          Object.entries(monthColMap).forEach(([periodKey, colIdx]) => {
                              let rawVal = row[colIdx];
                              let planVal = 0;
                              if (typeof rawVal === 'number') {
                                  planVal = rawVal;
                              } else if (rawVal) {
                                  planVal = parseFloat(String(rawVal).replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0;
                              }
                              planByMonth[periodKey] = planVal;
                          });

                          parsedBudget.push({
                              location: loc,
                              expenseHead: head,
                              planByMonth: planByMonth
                          });
                      });
                  } catch(e) {
                      console.log("Error to parse budget sheet.", e);
                  }
              }
              setBudgetData({ records: parsedBudget, availablePeriods: periodsList });


              // ==========================================
              // 4. Ultra-Safe Parse for Main 'Data' Sheet
              // ==========================================
              let headers = dataJson.table.cols?.map(c => c?.label?.trim().toLowerCase() || '') || [];
              let startIndex = 0;
              if (headers.every(h => h === '')) {
                  if (dataJson.table.rows[0]?.c) {
                      headers = dataJson.table.rows[0].c.map(c => String(c?.v || c?.f || '').trim().toLowerCase());
                      startIndex = 1;
                  }
              }
              const getIdx = (keywords) => {
                  let idx = headers.findIndex(h => keywords.includes(h));
                  if (idx !== -1) return idx;
                  return headers.findIndex(h => keywords.some(kw => h.includes(kw)));
              };
              
              const idxDate = getIdx(['date']);
              const idxInvoice = getIdx(['invoice']);
              const idxCash = getIdx(['cash']);
              const idxCard = getIdx(['card']);
              const idxPaytm = getIdx(['paytm']);
              const idxUpi = getIdx(['barcode-upi', 'barcode', 'upi']);
              const idxTotal = getIdx(['total amout paid', 'total amount paid', 'total amout', 'total amount']); 
              const idxAddOn = getIdx(['add-on', 'add on', 'addon']);
              const idxAddOnVal = getIdx(['add-on value', 'add on value', 'addon value']);
              const idxSoldBy = getIdx(['sold by']);
              const idxIncentive = getIdx(['incentive']);
              const idxExpHead = getIdx(['expense head']);
              const idxRemarks = getIdx(['remarks', 'subhead', 'sub head']); 
              const idxExpAmt = getIdx(['expense amount', 'exp amt']);
              const idxLocation = getIdx(['saloon location', 'location', 'saloon']);
              const idxUserEmp = getIdx(['user emp', 'user name', 'employee', 'emp name']);

              const parsedData = [];
              const extractedLocations = new Set(Object.keys(parsedBalances)); 

              for (let i = startIndex; i < dataJson.table.rows.length; i++) {
                  const row = dataJson.table.rows[i];
                  if (!row || !row.c) continue;

                  const getNum = (index) => {
                      if (index === -1 || !row.c[index]) return 0;
                      const cell = row.c[index];
                      if (cell.v !== null && cell.v !== undefined) {
                          if (typeof cell.v === 'number') return cell.v;
                          return parseFloat(String(cell.v).replace(/,/g, '').trim()) || 0;
                      }
                      if (cell.f) return parseFloat(String(cell.f).replace(/,/g, '').trim()) || 0;
                      return 0;
                  };

                  let loc = 'Unknown';
                  if (idxLocation !== -1 && row.c[idxLocation]) {
                      const cell = row.c[idxLocation];
                      if (cell.v !== null && cell.v !== undefined) loc = String(cell.v).trim();
                      else if (cell.f) loc = String(cell.f).trim();
                  }
                  if (loc && loc !== 'Unknown') {
                      extractedLocations.add(loc);
                  }

                  let timestamp = 0;
                  let displayDate = ''; 
                  if (idxDate !== -1 && row.c[idxDate]) {
                      const cell = row.c[idxDate];
                      displayDate = cell.f || (cell.v ? String(cell.v) : '');

                      if (cell.v && typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
                          const match = cell.v.match(/Date\((\d+),\s*(\d+),\s*(\d+)/);
                          if (match) {
                              const d = new Date(parseInt(match[1]), parseInt(match[2]), parseInt(match[3]));
                              timestamp = d.getTime();
                              if(!cell.f) displayDate = d.toLocaleDateString('en-IN');
                          }
                      } else if (displayDate) {
                          const datePart = displayDate.trim().split(/\s+/)[0];
                          const parts = datePart.split(/[\/\-]/);
                          if (parts.length === 3) {
                              if (parts[2].length === 4) { 
                                  let m = parseInt(parts[1]); let d = parseInt(parts[0]);
                                  if (m > 12) { const temp = m; m = d; d = temp; } 
                                  timestamp = new Date(parseInt(parts[2]), m - 1, d).getTime();
                              } else if (parts[0].length === 4) { 
                                  timestamp = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])).getTime();
                              } else timestamp = new Date(datePart).getTime() || 0;
                          } else timestamp = new Date(datePart).getTime() || 0;
                      }
                  }

                  parsedData.push({
                      timestamp, 
                      displayDate, 
                      invoiceNo: row.c[idxInvoice] ? String(row.c[idxInvoice].v || row.c[idxInvoice].f || '').trim() : '',
                      cash: getNum(idxCash), 
                      card: getNum(idxCard), 
                      paytm: getNum(idxPaytm),
                      upi: getNum(idxUpi), 
                      totalPaid: getNum(idxTotal), 
                      addOn: row.c[idxAddOn] ? String(row.c[idxAddOn].v || row.c[idxAddOn].f || '').trim() : '',
                      addOnValue: getNum(idxAddOnVal),
                      soldBy: row.c[idxSoldBy] ? String(row.c[idxSoldBy].v || row.c[idxSoldBy].f || '').trim() : '',
                      incentive: getNum(idxIncentive),
                      expenseHead: row.c[idxExpHead] ? String(row.c[idxExpHead].v || row.c[idxExpHead].f || '').trim() : '',
                      remarks: row.c[idxRemarks] ? String(row.c[idxRemarks].v || row.c[idxRemarks].f || '').trim() : '', 
                      expenseAmount: getNum(idxExpAmt),
                      location: loc,
                      userEmpName: row.c[idxUserEmp] ? String(row.c[idxUserEmp].v || row.c[idxUserEmp].f || '').trim() : ''
                  });
              }

              setLocations(Array.from(extractedLocations).sort());
              setData(parsedData);
            } catch (err) {
              console.error("Fetch Error Details:", err);
              if (err.name === 'AbortError') {
                  setError("Network timeout. Google Sheets load hone mein samasya aayi. Kripya refresh karein.");
              } else {
                  setError(err.message || "Failed to load data. Kripya ensure karein ki sheet public hai aur internet chal raha hai.");
              }
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => {
            fetchData();
          }, []);

          // Automatically set Budget Filters to first available period if not set
          useEffect(() => {
              if (budgetData.availablePeriods && budgetData.availablePeriods.length > 0 && !budgetYearFilter) {
                  setBudgetYearFilter(budgetData.availablePeriods[0].year);
                  setBudgetMonthFilter(budgetData.availablePeriods[0].month);
              }
          }, [budgetData]);

          const { startTimestamp, endTimestamp } = useMemo(() => {
            const parseLocalTime = (dateStr, isEnd) => {
                if (!dateStr) return isEnd ? Infinity : 0;
                const [y, m, d] = dateStr.split('-');
                if (isEnd) return new Date(y, m - 1, d, 23, 59, 59, 999).getTime();
                return new Date(y, m - 1, d, 0, 0, 0, 0).getTime();
            };
            return {
                startTimestamp: parseLocalTime(startDate, false),
                endTimestamp: parseLocalTime(endDate, true)
            };
          }, [startDate, endDate]);

          const filteredData = useMemo(() => {
            return data.filter(row => {
                if (selectedLocation !== 'All' && row.location !== selectedLocation) return false;
                if (row.timestamp < startTimestamp || row.timestamp > endTimestamp) return false;
                return true;
            });
          }, [data, startTimestamp, endTimestamp, selectedLocation]);

          const salesTotals = useMemo(() => {
            let cash = 0, card = 0, paytm = 0, upi = 0, totalPaid = 0;
            for (let i = 0; i < filteredData.length; i++) {
                const row = filteredData[i];
                cash += row.cash; card += row.card; paytm += row.paytm; upi += row.upi; totalPaid += row.totalPaid;
            }
            return { cash, card, paytm, upi, totalPaid };
          }, [filteredData]);

          const rawDataTotals = useMemo(() => {
            let addOnValue = 0, incentive = 0, bankDeposit = 0;
            for (let i = 0; i < filteredData.length; i++) {
                addOnValue += filteredData[i].addOnValue || 0;
                incentive += filteredData[i].incentive || 0;
                
                if (filteredData[i].expenseHead && filteredData[i].expenseHead.toLowerCase().includes('bank deposit')) {
                    bankDeposit += filteredData[i].expenseAmount || 0;
                }
            }
            return { addOnValue, incentive, bankDeposit };
          }, [filteredData]);

          const expenseData = useMemo(() => {
            const summary = {};
            let grandTotal = 0;

            for (let i = 0; i < filteredData.length; i++) {
                const row = filteredData[i];
                if (row.expenseAmount !== 0) {
                    const head = row.expenseHead || 'Uncategorized / Other';
                    if (!summary[head]) summary[head] = { amount: 0, details: [] };
                    summary[head].amount += row.expenseAmount;
                    summary[head].details.push(row); 
                    grandTotal += row.expenseAmount;
                }
            }
            const sortedSummary = Object.entries(summary).sort((a, b) => b[1].amount - a[1].amount);
            return { summary: sortedSummary, grandTotal };
          }, [filteredData]);

          const cashReportData = useMemo(() => {
            let baseOpeningCash = 0;
            if (selectedLocation === 'All') {
                baseOpeningCash = Object.values(baseBalances).reduce((sum, val) => sum + (Number(val) || 0), 0);
            } else {
                baseOpeningCash = Number(baseBalances[selectedLocation]) || 0;
            }

            let dynamicOpeningBalance = baseOpeningCash;
            const dailyDataMap = {};

            data.forEach(row => {
                if (selectedLocation !== 'All' && row.location !== selectedLocation) return;
                if (row.timestamp < BASE_DATE) return; 

                const dateObj = new Date(row.timestamp);
                const dateKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
                
                if (row.timestamp >= BASE_DATE && row.timestamp < startTimestamp) {
                    dynamicOpeningBalance += (Number(row.cash) || 0) - (Number(row.expenseAmount) || 0);
                } 
                else if (row.timestamp >= Math.max(BASE_DATE, startTimestamp) && row.timestamp <= endTimestamp) {
                    if (!dailyDataMap[dateKey]) {
                        dailyDataMap[dateKey] = {
                            displayDate: dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }),
                            cashIn: 0,
                            cashOut: 0,
                            timestamp: new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate()).getTime()
                        };
                    }
                    dailyDataMap[dateKey].cashIn += (Number(row.cash) || 0);
                    dailyDataMap[dateKey].cashOut += (Number(row.expenseAmount) || 0);
                }
            });

            const sortedDays = Object.values(dailyDataMap).sort((a, b) => a.timestamp - b.timestamp);

            let currentOpening = dynamicOpeningBalance;
            const finalReport = sortedDays.map(day => {
                const closing = currentOpening + day.cashIn - day.cashOut;
                const record = { ...day, opening: currentOpening, closing: closing };
                currentOpening = closing; 
                return record;
            });

            return {
                baseDateBalance: baseOpeningCash, 
                calculatedOpeningBalance: dynamicOpeningBalance, 
                dailyRecords: finalReport,
                finalClosingBalance: currentOpening
            };
          }, [data, baseBalances, startTimestamp, endTimestamp, selectedLocation]);

          const paymentReportData = useMemo(() => {
            const dailyLocMap = {};
            const locBalances = {}; 
            
            Object.keys(baseBalances).forEach(loc => locBalances[loc] = Number(baseBalances[loc]) || 0);

            const sortedData = [...data].filter(r => r.timestamp >= BASE_DATE).sort((a,b) => a.timestamp - b.timestamp);

            sortedData.forEach(row => {
                const loc = row.location;
                if (!loc || loc === 'Unknown') return; 

                const dateObj = new Date(row.timestamp);
                const dateKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
                const combinedKey = `${dateKey}_${loc}`; 
                
                const cashIn = Number(row.cash) || 0;
                const cashOut = Number(row.expenseAmount) || 0;
                const upiIn = (Number(row.upi) || 0) + (Number(row.paytm) || 0); 
                const cardIn = Number(row.card) || 0;

                if (!dailyLocMap[combinedKey]) {
                    dailyLocMap[combinedKey] = {
                        displayDate: dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }),
                        dateKey: dateKey,
                        location: loc,
                        sysCashIn: 0,
                        sysCashOut: 0,
                        sysUpi: 0,
                        sysCard: 0,
                        timestamp: new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate()).getTime()
                    };
                }
                
                dailyLocMap[combinedKey].sysCashIn += cashIn;
                dailyLocMap[combinedKey].sysCashOut += cashOut;
                dailyLocMap[combinedKey].sysUpi += upiIn;
                dailyLocMap[combinedKey].sysCard += cardIn;
                
                locBalances[loc] += (cashIn - cashOut);
                dailyLocMap[combinedKey].sysClosingCash = locBalances[loc]; 
            });

            const filteredRecords = Object.values(dailyLocMap).filter(record => {
                if (selectedLocation !== 'All' && record.location !== selectedLocation) return false;
                if (record.timestamp < startTimestamp || record.timestamp > endTimestamp) return false;
                return true;
            }).sort((a, b) => b.timestamp - a.timestamp);

            const finalReport = filteredRecords.map(record => {
                const mgrKey = `${record.dateKey}_${record.location}`;
                const mgr = managerData[mgrKey] || { cash: 0, upi: 0, card: 0, managerName: 'N/A' };
                
                return { 
                    ...record, 
                    mgrManagerName: mgr.managerName,
                    mgrClosingCash: mgr.cash,
                    cashVar: mgr.cash - record.sysClosingCash, 
                    mgrUpi: mgr.upi,
                    upiVar: mgr.upi - record.sysUpi,
                    mgrCard: mgr.card,
                    cardVar: mgr.card - record.sysCard
                };
            });

            return { records: finalReport };
          }, [data, baseBalances, managerData, startTimestamp, endTimestamp, selectedLocation]);

          const liveCashData = useMemo(() => {
            const locMap = {};
            Object.keys(baseBalances).forEach(loc => {
              locMap[loc] = { location: loc, baseOpeningCash: Number(baseBalances[loc]) || 0, totalCashIn: 0, totalCashOut: 0, liveBalance: Number(baseBalances[loc]) || 0 };
            });
            let overallBase = 0, overallIn = 0, overallOut = 0;
            Object.values(baseBalances).forEach(val => overallBase += (Number(val) || 0));

            data.forEach(row => {
                if (row.timestamp < BASE_DATE) return; 
                const loc = row.location;
                if (loc && loc !== 'Unknown') {
                    if (!locMap[loc]) locMap[loc] = { location: loc, baseOpeningCash: 0, totalCashIn: 0, totalCashOut: 0, liveBalance: 0 };
                    const cashIn = Number(row.cash) || 0;
                    const cashOut = Number(row.expenseAmount) || 0;
                    locMap[loc].totalCashIn += cashIn;
                    locMap[loc].totalCashOut += cashOut;
                    locMap[loc].liveBalance += (cashIn - cashOut);
                    overallIn += cashIn; overallOut += cashOut;
                }
            });

            const breakdown = Object.values(locMap).sort((a, b) => a.location.localeCompare(b.location));
            return { overallBase, overallIn, overallOut, overallBalance: overallBase + overallIn - overallOut, breakdown };
          }, [data, baseBalances]); 

          // ==========================================
          // DYNAMIC BUDGET REPORT LOGIC
          // Fetches Plan dynamically from Index and aggregates Actuals strictly for that specific Month/Year
          // ==========================================
          const budgetReportData = useMemo(() => {
            if (!budgetYearFilter || !budgetMonthFilter) return { records: [] };

            const budgetMap = {}; 
            const makeKey = (loc, head) => `${String(loc).trim().toLowerCase()}_${String(head).trim().toLowerCase()}`;
            const targetPeriodKey = `${budgetYearFilter}-${budgetMonthFilter}`;
            
            // 1. Process Plan dynamically based on selected Year/Month
            const bRecords = budgetData.records || [];
            bRecords.forEach(b => {
                const locClean = String(b.location).trim();
                const headClean = String(b.expenseHead).trim();
                
                // Match Global Selection (We'll do local filters later)
                if (selectedLocation !== 'All' && locClean.toLowerCase() !== selectedLocation.toLowerCase()) return;
                
                const key = makeKey(locClean, headClean);
                if (!budgetMap[key]) {
                    budgetMap[key] = { location: locClean, head: headClean, plan: 0, actual: 0 };
                }
                
                if (b.planByMonth && b.planByMonth[targetPeriodKey]) {
                    budgetMap[key].plan += b.planByMonth[targetPeriodKey];
                }
            });

            // 2. Fetch Actual Expenses strictly for the Selected Year/Month
            const monthNames = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
            const targetMonthIdx = monthNames[budgetMonthFilter.toLowerCase().substring(0,3)];
            const targetYear = parseInt(budgetYearFilter);

            if (targetMonthIdx !== undefined && !isNaN(targetYear)) {
                const budgetStart = new Date(targetYear, targetMonthIdx, 1).getTime();
                const budgetEnd = new Date(targetYear, targetMonthIdx + 1, 0, 23, 59, 59, 999).getTime(); 

                data.forEach(r => {
                    const locClean = String(r.location || 'Unknown').trim();
                    const headClean = String(r.expenseHead || 'Uncategorized / Other').trim();
                    
                    if (selectedLocation !== 'All' && locClean.toLowerCase() !== selectedLocation.toLowerCase()) return;
                    if (!r.expenseAmount || r.expenseAmount === 0) return; 

                    // Strict filter based on selected Year & Month
                    if (!r.timestamp || r.timestamp < budgetStart || r.timestamp > budgetEnd) return;

                    const key = makeKey(locClean, headClean);
                    
                    if (!budgetMap[key]) {
                        budgetMap[key] = { location: locClean, head: headClean, plan: 0, actual: 0 };
                    }
                    budgetMap[key].actual += r.expenseAmount;
                });
            }

            const records = Object.values(budgetMap).map(row => {
                const variance = row.plan - row.actual;
                return { ...row, variance };
            }).sort((a, b) => {
                if (a.location === b.location) return a.head.localeCompare(b.head);
                return a.location.localeCompare(b.location);
            });

            return { records };
          }, [budgetData, data, selectedLocation, budgetYearFilter, budgetMonthFilter]); 

          // ==========================================
          // BUDGET LOCAL FILTERS & DERIVED DATA
          // ==========================================
          const { 
            budgetAvailableYears, 
            budgetAvailableMonths,
            budgetLocations, 
            budgetHeads, 
            filteredBudgetRecords, 
            filteredBudgetTotals 
          } = useMemo(() => {
              // Available dropdowns from Index Sheet
              const aYears = Array.from(new Set((budgetData.availablePeriods || []).map(p => p.year))).sort();
              const aMonths = Array.from(new Set((budgetData.availablePeriods || []).filter(p => p.year === budgetYearFilter).map(p => p.month)));

              const locs = new Set();
              const heads = new Set();
              
              budgetReportData.records.forEach(r => {
                  locs.add(r.location);
                  heads.add(r.head);
              });

              // Apply Local Filters
              const records = budgetReportData.records.filter(r => {
                  const matchLoc = budgetLocFilter === 'All' || r.location === budgetLocFilter;
                  const matchHead = budgetHeadFilter === 'All' || r.head === budgetHeadFilter;
                  return matchLoc && matchHead;
              });

              let plan = 0, actual = 0;
              records.forEach(r => {
                  plan += r.plan;
                  actual += r.actual;
              });

              return {
                  budgetAvailableYears: aYears,
                  budgetAvailableMonths: aMonths,
                  budgetLocations: Array.from(locs).sort(),
                  budgetHeads: Array.from(heads).sort(),
                  filteredBudgetRecords: records,
                  filteredBudgetTotals: { plan, actual, variance: plan - actual }
              };
          }, [budgetData, budgetReportData, budgetYearFilter, budgetLocFilter, budgetHeadFilter]);

          const formatUtilized = (plan, actual) => {
              if (plan > 0) return ((actual / plan) * 100).toFixed(2) + '%';
              if (actual > 0) return 'Out of Budget';
              return '0.00%';
          };

          const monthlyReportData = useMemo(() => {
            const monthlyMap = {};
            data.forEach(row => {
                if (selectedLocation !== 'All' && row.location !== selectedLocation) return;
                if (!row.timestamp) return;
                const dateObj = new Date(row.timestamp);
                const displayMonth = dateObj.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
                const sortKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                if (!monthlyMap[sortKey]) {
                    monthlyMap[sortKey] = { displayMonth, sortKey, cash: 0, card: 0, paytm: 0, upi: 0, totalSales: 0, totalExpense: 0 };
                }
                monthlyMap[sortKey].cash += (Number(row.cash) || 0);
                monthlyMap[sortKey].card += (Number(row.card) || 0);
                monthlyMap[sortKey].paytm += (Number(row.paytm) || 0);
                monthlyMap[sortKey].upi += (Number(row.upi) || 0);
                monthlyMap[sortKey].totalSales += (Number(row.totalPaid) || 0);
                monthlyMap[sortKey].totalExpense += (Number(row.expenseAmount) || 0);
            });
            return Object.values(monthlyMap).sort((a, b) => a.sortKey.localeCompare(b.sortKey));
          }, [data, selectedLocation]); 

          const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-IN', {
              style: 'currency',
              currency: 'INR',
              minimumFractionDigits: 2,
              maximumFractionDigits: 2
            }).format(Number(amount) || 0); 
          };

          // ==========================================
          // MODAL FILTERING LOGIC
          // ==========================================
          const modalLocations = useMemo(() => {
            if (!selectedExpenseForDetail) return [];
            const locs = new Set(selectedExpenseForDetail.details.map(item => item.location || 'Unknown'));
            return Array.from(locs).sort();
          }, [selectedExpenseForDetail]);

          const modalFilteredDetails = useMemo(() => {
            if (!selectedExpenseForDetail) return [];
            if (modalLocationFilter === 'All') return selectedExpenseForDetail.details;
            return selectedExpenseForDetail.details.filter(item => (item.location || 'Unknown') === modalLocationFilter);
          }, [selectedExpenseForDetail, modalLocationFilter]);

          const modalFilteredTotal = useMemo(() => {
            return modalFilteredDetails.reduce((sum, item) => sum + (Number(item.expenseAmount) || 0), 0);
          }, [modalFilteredDetails]);

          // ==========================================
          // EXPORT CSV LOGIC
          // ==========================================
          const downloadCSV = (content, filename) => {
            const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          const escapeCSV = (val) => `"${String(val || '').replace(/"/g, '""')}"`;

          const handleExportRawData = () => {
            const headers = ["Date", "Invoice No.", "Cash", "Card", "Paytm", "Barcode-UPI", "Total Amount Paid", "Add-On", "Add-On Value", "Sold By", "Incentive", "Expense Head", "Remarks/ SubHead", "Expense Amount", "Saloon Location", "User Emp Name"];
            const rows = filteredData.map(r => [
              r.displayDate, r.invoiceNo, r.cash, r.card, r.paytm, r.upi, r.totalPaid,
              r.addOn, r.addOnValue, r.soldBy, r.incentive, r.expenseHead, r.remarks, r.expenseAmount, r.location, r.userEmpName
            ]);
            const csvContent = [headers.join(","), ...rows.map(r => r.map(escapeCSV).join(","))].join("\n");
            downloadCSV(csvContent, `Raw_Data_${startDate}_to_${endDate}.csv`);
          };

          const handleExportExpenses = () => {
            const headers = ["Expense Head", "Total Amount"];
            const rows = expenseData.summary.map(([head, expData]) => [head, expData.amount]);
            rows.push(["Grand Total", expenseData.grandTotal]);
            const csvContent = [headers.join(","), ...rows.map(r => r.map(escapeCSV).join(","))].join("\n");
            downloadCSV(csvContent, `Expense_Report_${startDate}_to_${endDate}.csv`);
          };

          const handleExportCashReport = () => {
            const headers = ["Date", "Opening Cash", "Cash In (Sales)", "Cash Out (Expense)", "Closing Cash"];
            const rows = cashReportData.dailyRecords.map(day => [day.displayDate, day.opening, day.cashIn, day.cashOut, day.closing]);
            const csvContent = [headers.join(","), ...rows.map(r => r.map(escapeCSV).join(","))].join("\n");
            downloadCSV(csvContent, `Cash_Report_${startDate}_to_${endDate}.csv`);
          };

          const handleExportPaymentReport = () => {
            const headers = [
                "Date", "Location", "Manager Name", 
                "System Cash Closing", "Manager Cash Closing", "Cash Variance",
                "System UPI", "Manager UPI", "UPI Variance",
                "System Card", "Manager Card", "Card Variance"
            ];
            const rows = paymentReportData.records.map(day => [
                day.displayDate, day.location, day.mgrManagerName,
                day.sysClosingCash, day.mgrClosingCash, day.cashVar,
                day.sysUpi, day.mgrUpi, day.upiVar,
                day.sysCard, day.mgrCard, day.cardVar
            ]);
            const csvContent = [headers.join(","), ...rows.map(r => r.map(escapeCSV).join(","))].join("\n");
            downloadCSV(csvContent, `Payment_Variance_Report_${startDate}_to_${endDate}.csv`);

                      <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div className="bg-amber-600 p-6 md:p-8 rounded-2xl shadow-lg border border-amber-700 flex items-center gap-4 text-white relative overflow-hidden mb-6">
                          <div className="bg-white/10 p-4 md:p-5 rounded-2xl backdrop-blur-sm z-10 shrink-0">
                            <span className="text-3xl">🏦</span>
                          </div>
                          <div className="z-10 overflow-hidden">
                            <p className="text-sm md:text-base font-medium text-amber-100">Total Opening Baseline (All Locations)</p>
                            <p className="text-3xl md:text-5xl font-bold truncate mt-1">
                              {formatCurrency(Object.values(baseBalances).reduce((a, b) => a + (Number(b) || 0), 0))}
                            </p>
                          </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                          <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50">
                            <h3 className="text-lg font-bold text-gray-800">Fixed Opening Cash Balances (As of 1 Nov 2025)</h3>
                            <p className="text-sm text-gray-500 mt-1">Fetched directly from the "Cash Flow" sheet tab.</p>
                          </div>
                          
                          {Object.keys(baseBalances).length === 0 ? (
                            <div className="p-8 text-center text-gray-500">
                              <p>Cash Flow sheet mein koi base balance nahi mila.</p>
                            </div>
                          ) : (
                            <div className="overflow-x-auto">
                              <table className="w-full text-left border-collapse">
                                <thead>
                                  <tr className="bg-gray-50 border-b border-gray-100 text-gray-600 text-sm">
                                    <th className="p-4 font-semibold">Saloon Location / Username</th>
                                    <th className="p-4 font-semibold text-right">Opening Balance (1 Nov)</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {Object.entries(baseBalances).map(([loc, amt], index) => (
                                    <tr key={`bal-${index}`} className="border-b border-gray-50 hover:bg-amber-50/30 transition-colors">
                                      <td className="p-4 text-gray-800 font-medium">{loc}</td>
                                      <td className="p-4 text-right text-gray-800 font-semibold">{formatCurrency(amt)}</td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* Drill-Down Modal */}
              {selectedExpenseForDetail && (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 border-b border-gray-100 bg-gray-50 gap-4">
                      <div>
                        <h3 className="text-xl font-bold text-gray-900">{selectedExpenseForDetail.head}</h3>
                        <p className="text-sm text-gray-500 mt-1">
                          Total Amount: <span className="font-semibold text-indigo-600">{formatCurrency(modalFilteredTotal)}</span> 
                          <span className="mx-2">•</span> 
                          {modalFilteredDetails.length} Transaction(s)
                        </p>
                      </div>
                      <div className="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                        <select
                          value={modalLocationFilter}
                          onChange={(e) => setModalLocationFilter(e.target.value)}
                          className="border border-gray-300 rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white text-gray-800 text-sm flex-1 sm:flex-none"
                        >
                          <option value="All">All Locations</option>
                          {modalLocations.map((loc, idx) => (
                            <option key={`mod-loc-${idx}`} value={loc}>{loc}</option>
                          ))}
                        </select>
                        <button 
                          onClick={handleExportModalDetails}
                          className="flex items-center gap-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-1.5 rounded-lg font-medium text-sm transition-colors shadow-sm"
                        >
                          <Download className="w-4 h-4" /> Export CSV
                        </button>
                        <button 
                          onClick={() => { setSelectedExpenseForDetail(null); setModalLocationFilter('All'); }}
                          className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-200 rounded-full transition-colors shrink-0"
                        >
                          <X className="w-6 h-6" />
                        </button>
                      </div>
                    </div>

                    <div className="overflow-y-auto p-0">
                      <table className="w-full text-left border-collapse">
                        <thead className="sticky top-0 bg-white shadow-sm ring-1 ring-black/5 z-10">
                          <tr className="text-gray-600 text-sm bg-gray-50/90 backdrop-blur-md">
                            <th className="p-4 font-semibold whitespace-nowrap border-b border-gray-200">Date</th>
                            <th className="p-4 font-semibold border-b border-gray-200">Remarks / SubHead</th>
                            <th className="p-4 font-semibold border-b border-gray-200">Saloon Location</th>
                            <th className="p-4 font-semibold text-right whitespace-nowrap border-b border-gray-200">Exp Amt</th>
                            {selectedExpenseForDetail.head?.trim() === 'Incentive Expenses' && (
                                <th className="p-4 font-semibold border-b border-gray-200">Sold By</th>
                            )}
                          </tr>
                        </thead>
                        <tbody>
                          {modalFilteredDetails.map((item, idx) => (
                            <tr key={`mod-${idx}`} className="border-b border-gray-50 hover:bg-blue-50/40 transition-colors">
                              <td className="p-4 text-gray-600 text-sm whitespace-nowrap">{item.displayDate || 'Unknown Date'}</td>
                              <td className="p-4 text-gray-800 text-sm">{item.remarks || <span className="text-gray-400 italic">No remarks</span>}</td>
                              <td className="p-4 text-gray-800 text-sm whitespace-nowrap">{item.location || 'Unknown'}</td>
                              <td className="p-4 text-right text-gray-900 font-medium whitespace-nowrap">
                                {formatCurrency(item.expenseAmount)}
                              </td>
                              {selectedExpenseForDetail.head?.trim() === 'Incentive Expenses' && (
                                <td className="p-4 text-gray-800 text-sm whitespace-nowrap">{item.soldBy || '-'}</td>
                              )}
                            </tr>
                          ))}
                          {modalFilteredDetails.length === 0 && (
                            <tr>
                              <td colSpan="5" className="p-8 text-center text-gray-500">No transactions found for this location.</td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                    
                    <div className="p-4 border-t border-gray-100 bg-gray-50 text-right">
                      <button 
                        onClick={() => { setSelectedExpenseForDetail(null); setModalLocationFilter('All'); }}
                        className="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium rounded-lg transition-colors"
                      >
                        Close View
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function AppWithBoundary() {
          return (
            <ErrorBoundary>
              <DashboardApp />
            </ErrorBoundary>
          );
        }

        // --- Render the Application ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWithBoundary />);
    </script>
</body>
</html>
